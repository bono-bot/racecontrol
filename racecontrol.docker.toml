[venue]
name = "RacingPoint"
location = "Bandlaguda, Hyderabad"
timezone = "Asia/Kolkata"

[server]
host = "0.0.0.0"
port = 8080

[database]
path = "/app/data/racecontrol.db"

[cloud]
enabled = false

[pods]
count = 16
discovery = true

[branding]
primary_color = "#FF4400"
theme = "dark"

[ai_debugger]
enabled = true
ollama_url = "http://host.docker.internal:11434"
ollama_model = "llama3.1:8b"
chat_enabled = true
proactive_analysis = true

[ac_server]
acserver_path = "/opt/ac-server/acServer"
data_dir = "/app/data/ac_servers"

[integrations.discord]
results_channel = "race-results"

[integrations.whatsapp]
enabled = false
contact = "+917981264279"
