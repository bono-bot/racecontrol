<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RacingPoint</title>
<style>body{background:#1A1A1A;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.c{text-align:center}.s{width:32px;height:32px;border:3px solid #E10600;border-top-color:transparent;border-radius:50%;animation:r .8s linear infinite;margin:0 auto 16px}

</head><body><div class="c"><div class="s"></div><p>Signing you in...</p></div>
<script>
try{localStorage.removeItem("rp_token");localStorage.setItem("rp_auth_v","2")}catch(e){}
window.location.replace("/login");
</script></body></html>
