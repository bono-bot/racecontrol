# --- Process Guard (report_only mode -- BUG-03) ---
# Scans pods for unauthorized processes. In report_only mode, violations are
# logged but never killed. Full allowlist TBD after live pod scan.
[process_guard]
enabled = true
violation_action = "report_only"
poll_interval_secs = 60
warn_before_kill = true

# Baseline allowlist -- known-good processes on pods.
# Full list to be built from live pod scan when pods come online.
[[process_guard.allowed]]
name = "rc-agent.exe"
category = "racecontrol"
machines = ["pod"]

[[process_guard.allowed]]
