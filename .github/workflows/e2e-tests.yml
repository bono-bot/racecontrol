name: Kiosk Tests

on:
  push:
    branches: [main]
    paths:
      - 'kiosk/**'
      - 'packages/shared-types/**'
      - 'tests/e2e/playwright/kiosk/**'
      - 'playwright.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'kiosk/**'
      - 'packages/shared-types/**'
      - 'tests/e2e/playwright/kiosk/**'
      - 'playwright.config.ts'

jobs:
  unit-tests:
    name: Kiosk Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kiosk/package-lock.json

      - name: Install shared-types
        run: npm install
        working-directory: packages/shared-types

      - name: Install kiosk dependencies
        run: npm install
        working-directory: kiosk

      - name: Run unit tests
        run: npm test
        working-directory: kiosk

  e2e-kiosk:
    name: Kiosk E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            kiosk/package-lock.json

      - name: Install Playwright
        run: npm ci
        working-directory: .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install shared-types
        run: npm install
        working-directory: packages/shared-types

      - name: Install kiosk dependencies
        run: npm install
        working-directory: kiosk

      - name: Build kiosk
        run: npm run build
        working-directory: kiosk

      - name: Start kiosk server
        run: |
          npm run start &
          npx wait-on http://localhost:3300/kiosk/api/health --timeout 30000
        working-directory: kiosk
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws/dashboard

      - name: Run kiosk E2E tests
        run: npx playwright test --project=kiosk
        env:
          KIOSK_BASE_URL: http://localhost:3300/kiosk

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-e2e-report
          path: tests/e2e/report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-e2e-results
          path: tests/e2e/results/
          retention-days: 7
