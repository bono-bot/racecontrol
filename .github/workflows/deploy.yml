name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/racingpoint
            git -C racecontrol pull origin main
            git -C racingpoint-admin pull origin main
            cp racecontrol/cloud/compose.yml .
            cp racecontrol/cloud/Caddyfile .
            docker compose build
            docker compose up -d
            docker compose ps
