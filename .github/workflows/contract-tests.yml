name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/contract-tests/package-lock.json

      - name: Install shared-types dependencies
        run: npm install
        working-directory: packages/shared-types

      - name: Install contract-tests dependencies
        run: npm install
        working-directory: packages/contract-tests

      - name: Run contract tests
        run: npm test
        working-directory: packages/contract-tests

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: packages/contract-tests/test-results/
          retention-days: 7
