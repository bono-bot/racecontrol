[venue]
name = "RacingPoint"
location = "Bandlaguda, Hyderabad"
timezone = "Asia/Kolkata"

[server]
host = "0.0.0.0"
port = 8080

[database]
path = "./data/racecontrol.db"

[cloud]
enabled = true
api_url = "https://app.racingpoint.cloud/api/v1"
sync_interval_secs = 30
terminal_secret = "rp-terminal-2026"

[pods]
count = 16
discovery = true

[branding]
primary_color = "#FF4400"
theme = "dark"

[ai_debugger]
enabled = true
ollama_url = "http://localhost:11434"
ollama_model = "llama3.1:8b"
chat_enabled = true
proactive_analysis = true
# anthropic_api_key = "sk-ant-..."  # Optional fallback when Ollama is unavailable

[ac_server]
acserver_path = "/opt/ac-server/acServer"
data_dir = "./data/ac_servers"
# lan_ip = "192.168.1.100"  # Auto-detected if not set

[integrations.discord]
results_channel = "race-results"

[integrations.whatsapp]
enabled = false
contact = "+917981264279"
