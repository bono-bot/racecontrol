<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Racing Point — Cameras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A1A1A; color: #fff; font-family: Montserrat, sans-serif; padding: 16px; }
  h1 { color: #E10600; margin-bottom: 16px; font-size: 1.4rem; }
  .controls { margin-bottom: 12px; display: flex; gap: 12px; align-items: center; font-size: 0.8rem; color: #999; }
  .controls select, .controls button {
    background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;
    padding: 4px 8px; font-size: 0.8rem; cursor: pointer;
  }
  .controls button:hover { background: #444; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
  .cam { background: #222; border: 1px solid #333; border-radius: 6px; overflow: hidden; position: relative; }
  .cam-header {
    padding: 6px 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
    display: flex; justify-content: space-between; align-items: center; background: #1a1a1a;
  }
  .cam-header .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: #4caf50; }
  .dot.err { background: #E10600; }
  .cam img { width: 100%; display: block; background: #000; min-height: 180px; cursor: pointer; }
  .cam img.stale { opacity: 0.4; }
  .fullscreen { position: fixed; inset: 0; z-index: 100; background: #000; display: none; }
  .fullscreen img { width: 100%; height: 100%; object-fit: contain; }
  .fullscreen .close { position: absolute; top: 12px; right: 16px; color: #fff; font-size: 2rem; cursor: pointer; z-index: 101; }
</style>
</head>
<body>
<h1>Racing Point — Live Cameras</h1>
<div class="controls">
  <span id="status">Loading...</span>
  <select id="rate">
    <option value="1000">1 fps</option>
    <option value="2000" selected>0.5 fps</option>
    <option value="5000">0.2 fps</option>
  </select>
</div>
<div class="grid" id="grid"></div>

<div class="fullscreen" id="fs">
  <span class="close" id="fs-close">&times;</span>
  <img id="fs-img">
</div>

<script>
var CHANNELS = [
  { ch: 1,  name: 'Entrance' },
  { ch: 2,  name: 'Camera 2' },
  { ch: 3,  name: 'Reception Wide' },
  { ch: 4,  name: 'Reception' },
  { ch: 5,  name: 'Camera 5' },
  { ch: 6,  name: 'Camera 6' },
  { ch: 7,  name: 'Camera 7' },
  { ch: 8,  name: 'Camera 8' },
  { ch: 9,  name: 'Camera 9' },
  { ch: 10, name: 'Camera 10' },
  { ch: 11, name: 'Camera 11' },
  { ch: 12, name: 'Camera 12' },
  { ch: 13, name: 'Camera 13' }
];

var grid = document.getElementById('grid');
var statusEl = document.getElementById('status');
var rateEl = document.getElementById('rate');
var imgs = {};

// Build grid using safe DOM methods
CHANNELS.forEach(function(c) {
  var card = document.createElement('div');
  card.className = 'cam';

  var hdr = document.createElement('div');
  hdr.className = 'cam-header';

  var label = document.createElement('span');
  label.textContent = c.name + ' (Ch ' + c.ch + ')';

  var dot = document.createElement('span');
  dot.className = 'dot';
  dot.id = 'dot-' + c.ch;

  hdr.appendChild(label);
  hdr.appendChild(dot);

  var img = document.createElement('img');
  img.id = 'cam-' + c.ch;
  img.alt = c.name;
  img.addEventListener('click', function() { openFs(c.ch); });

  card.appendChild(hdr);
  card.appendChild(img);
  grid.appendChild(card);

  imgs[c.ch] = img;
});

var ok = 0, fail = 0;

function refresh() {
  ok = 0; fail = 0;
  CHANNELS.forEach(function(c) {
    var img = new Image();
    var t = Date.now();
    img.onload = function() {
      imgs[c.ch].src = this.src;
      imgs[c.ch].classList.remove('stale');
      document.getElementById('dot-' + c.ch).className = 'dot ok';
      ok++;
      updateStatus();
    };
    img.onerror = function() {
      imgs[c.ch].classList.add('stale');
      document.getElementById('dot-' + c.ch).className = 'dot err';
      fail++;
      updateStatus();
    };
    img.src = '/api/v1/cameras/nvr/' + c.ch + '/snapshot?t=' + t;
  });
}

function updateStatus() {
  if (ok + fail === CHANNELS.length) {
    statusEl.textContent = ok + '/' + CHANNELS.length + ' cameras online';
  }
}

var timer;
function startLoop() {
  clearInterval(timer);
  refresh();
  timer = setInterval(refresh, parseInt(rateEl.value));
}
rateEl.addEventListener('change', startLoop);
startLoop();

// Fullscreen
function openFs(ch) {
  document.getElementById('fs').style.display = 'block';
  document.getElementById('fs-img').src = imgs[ch].src;
}
function closeFs() {
  document.getElementById('fs').style.display = 'none';
}
document.getElementById('fs-close').addEventListener('click', closeFs);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeFs(); });
</script>
</body>
</html>
