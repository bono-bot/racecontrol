<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Racing Point — Cameras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #111; color: #fff; font-family: Montserrat, sans-serif;
    display: flex; flex-direction: column;
  }
  .toolbar {
    flex: 0 0 auto; padding: 6px 12px;
    display: flex; align-items: center; gap: 12px;
    background: #1A1A1A; border-bottom: 1px solid #333;
  }
  .toolbar h1 { color: #E10600; font-size: 1rem; margin-right: auto; }
  .toolbar span { font-size: 0.75rem; color: #999; }
  .toolbar select {
    background: #333; color: #fff; border: 1px solid #555; border-radius: 3px;
    padding: 2px 6px; font-size: 0.75rem;
  }
  .grid {
    flex: 1 1 auto; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 4px; padding: 4px;
  }
  .cam { background: #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; }
  .cam-label {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 3px 8px; font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.5px; background: rgba(0,0,0,0.6);
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none; z-index: 1;
  }
  .cam-label .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: #4caf50; }
  .dot.err { background: #E10600; }
  .cam img { width: 100%; display: block; background: #000; cursor: pointer; aspect-ratio: 16/9; object-fit: cover; }
  .cam img.stale { opacity: 0.35; }
  .fullscreen { position: fixed; inset: 0; z-index: 100; background: #000; display: none; cursor: pointer; }
  .fullscreen img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>RACING POINT</h1>
  <span id="status">Loading...</span>
  <select id="rate">
    <option value="1000">1 fps</option>
    <option value="2000" selected>0.5 fps</option>
    <option value="5000">0.2 fps</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<div class="fullscreen" id="fs">
  <img id="fs-img">
</div>

<script>
var CHANNELS = [
  { ch: 1,  name: 'Entrance' },
  { ch: 2,  name: 'Camera 2' },
  { ch: 3,  name: 'Reception Wide' },
  { ch: 4,  name: 'Reception' },
  { ch: 5,  name: 'Camera 5' },
  { ch: 6,  name: 'Camera 6' },
  { ch: 7,  name: 'Camera 7' },
  { ch: 8,  name: 'Camera 8' },
  { ch: 9,  name: 'Camera 9' },
  { ch: 10, name: 'Camera 10' },
  { ch: 11, name: 'Camera 11' },
  { ch: 12, name: 'Camera 12' },
  { ch: 13, name: 'Camera 13' }
];

var grid = document.getElementById('grid');
var statusEl = document.getElementById('status');
var rateEl = document.getElementById('rate');
var fsEl = document.getElementById('fs');
var fsImg = document.getElementById('fs-img');
var imgs = {};

CHANNELS.forEach(function(c) {
  var card = document.createElement('div');
  card.className = 'cam';

  var label = document.createElement('div');
  label.className = 'cam-label';

  var name = document.createElement('span');
  name.textContent = c.name + ' (Ch ' + c.ch + ')';

  var dot = document.createElement('span');
  dot.className = 'dot';
  dot.id = 'dot-' + c.ch;

  label.appendChild(name);
  label.appendChild(dot);

  var img = document.createElement('img');
  img.id = 'cam-' + c.ch;
  img.alt = c.name;
  img.addEventListener('click', function() { openFs(c.ch); });

  card.appendChild(label);
  card.appendChild(img);
  grid.appendChild(card);

  imgs[c.ch] = img;
});

var ok = 0, fail = 0;

function refresh() {
  ok = 0; fail = 0;
  CHANNELS.forEach(function(c) {
    var img = new Image();
    var t = Date.now();
    img.onload = function() {
      imgs[c.ch].src = this.src;
      imgs[c.ch].classList.remove('stale');
      document.getElementById('dot-' + c.ch).className = 'dot ok';
      ok++;
      updateStatus();
    };
    img.onerror = function() {
      imgs[c.ch].classList.add('stale');
      document.getElementById('dot-' + c.ch).className = 'dot err';
      fail++;
      updateStatus();
    };
    img.src = '/api/v1/cameras/nvr/' + c.ch + '/snapshot?t=' + t;
  });
}

function updateStatus() {
  if (ok + fail === CHANNELS.length) {
    statusEl.textContent = ok + '/' + CHANNELS.length + ' online';
  }
}

var timer;
function startLoop() {
  clearInterval(timer);
  refresh();
  timer = setInterval(refresh, parseInt(rateEl.value));
}
rateEl.addEventListener('change', startLoop);
startLoop();

function openFs(ch) {
  fsEl.style.display = 'block';
  fsImg.src = imgs[ch].src;
}
function closeFs() {
  fsEl.style.display = 'none';
}
fsEl.addEventListener('click', closeFs);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeFs(); });
</script>
</body>
</html>
