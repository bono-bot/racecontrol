<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Racing Point — Cameras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
<script type="module" src="http://192.168.31.27:1984/video-stream.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex; flex-direction: column;
    background: #111; color: #fff;
    font-family: Montserrat, sans-serif;
  }

  /* ── Toolbar ────────────────────────────────────────────────── */
  .toolbar {
    flex: 0 0 auto;
    padding: 4px 12px;
    display: flex; align-items: center; gap: 8px;
    background: #1A1A1A;
    border-bottom: 1px solid #333;
  }
  .toolbar h1 {
    color: #E10600;
    font-size: 0.9rem;
    margin-right: auto;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  #status {
    font-size: 0.7rem;
    color: #999;
  }

  /* ── Layout buttons ─────────────────────────────────────────── */
  .layout-btn {
    width: 28px; height: 28px;
    background: #333;
    border: 1px solid #555;
    border-radius: 3px;
    color: #ccc;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; font-family: monospace;
    transition: background 0.15s, border-color 0.15s;
  }
  .layout-btn.active {
    background: #E10600;
    border-color: #E10600;
    color: #fff;
  }

  /* ── Rate select ────────────────────────────────────────────── */
  #rate {
    background: #333; color: #fff;
    border: 1px solid #555; border-radius: 3px;
    padding: 2px 6px; font-size: 0.7rem;
  }

  /* ── Camera grid — responsive 4-column for 13 cameras ──────── */
  #grid {
    flex: 1 1 auto;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 2px;
    padding: 2px;
  }
  @media (max-width: 1200px) { #grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { #grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px)  { #grid { grid-template-columns: 1fr; } }

  /* ── Camera tile ────────────────────────────────────────────── */
  .cam {
    background: #222;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16 / 9;
  }
  .cam-label {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 3px 8px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(0, 0, 0, 0.65);
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Status dot ─────────────────────────────────────────────── */
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot-live    { background: #4caf50; }
  .dot-stale   { background: #ffc107; }
  .dot-offline { background: #E10600; }

  /* ── Camera image / video ──────────────────────────────────── */
  .cam img, .cam video-stream {
    width: 100%; height: 100%;
    display: block;
    background: #000;
    cursor: pointer;
    object-fit: cover;
  }
  /* Style go2rtc video-stream tiles — hide controls overlay but keep clicks working */
  .cam video-stream video {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .cam video-stream video::-webkit-media-controls { display: none !important; }
  .cam video-stream video::-webkit-media-controls-enclosure { display: none !important; }
  /* Overlay to capture clicks above video-stream (go2rtc may consume click events) */
  .cam .click-overlay {
    position: absolute; inset: 0; z-index: 2; cursor: pointer;
  }
  .cam video-stream .info,
  .cam video-stream .mode,
  .cam video-stream .status {
    display: none !important;
  }

  /* ── Offline state ──────────────────────────────────────────── */
  .cam.offline { opacity: 0.4; }
  .cam.offline .offline-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.75rem;
    font-weight: 700;
    color: #E10600;
    letter-spacing: 1px;
    z-index: 2;
    pointer-events: none;
  }

  /* ── Drag visual feedback ───────────────────────────────────── */
  .cam[draggable="true"] { cursor: grab; }
  .cam.dragging { opacity: 0.6; cursor: grabbing; }
  .cam.drag-over { outline: 2px dashed #E10600; outline-offset: -2px; }

  /* ── Zone headers ───────────────────────────────────────────── */
  .zone-header {
    grid-column: 1 / -1;
    padding: 2px 10px;
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
  }
  .zone-header:hover { color: #ccc; }
  .zone-header .zone-arrow {
    font-size: 0.5rem;
    transition: transform 0.2s;
  }
  .zone-header.collapsed .zone-arrow {
    transform: rotate(-90deg);
  }
  .zone-cameras-hidden { display: none; }

  /* ── Pre-warm indicator on tile hover ───────────────────────── */
  .cam.pre-warming {
    outline: 2px solid #4caf50;
    outline-offset: -2px;
    animation: prewarm-pulse 1.5s ease-in-out infinite;
  }
  @keyframes prewarm-pulse {
    0%, 100% { outline-color: rgba(76, 175, 80, 0.3); }
    50%       { outline-color: rgba(76, 175, 80, 0.8); }
  }

  /* ── Fullscreen overlay ─────────────────────────────────────── */
  .fullscreen {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fs-fade-in 0.2s ease;
  }
  .fullscreen.visible { display: flex; }
  @keyframes fs-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fs-controls {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 101;
    transition: opacity 0.3s;
  }
  .fs-controls.auto-hidden { opacity: 0; }
  .fs-controls:hover { opacity: 1 !important; }
  .fs-cam-name {
    font-size: 0.85rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-right: auto;
  }
  .fs-status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .fs-status-dot.connecting { background: #ffc107; animation: pulse 1s infinite; }
  .fs-status-dot.connected  { background: #4caf50; }
  .fs-status-dot.failed     { background: #E10600; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  .fs-close-btn {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%;
    color: #fff; font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .fs-close-btn:hover { background: rgba(255,255,255,0.3); }
  .fs-video {
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }
  .fs-loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 102;
  }
  .fs-spinner {
    width: 40px; height: 40px;
    border: 3px solid #333;
    border-top: 3px solid #E10600;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .fs-fallback-msg {
    position: absolute;
    bottom: 20%; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem; color: #999;
    background: rgba(0,0,0,0.7);
    padding: 6px 14px; border-radius: 4px;
    z-index: 102;
  }

  /* Fullscreen prev/next nav buttons */
  .fs-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 48px; height: 80px;
    background: rgba(255,255,255,0.1);
    border: none; border-radius: 4px;
    color: #fff; font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 103;
    opacity: 0;
    transition: opacity 0.3s, background 0.15s;
  }
  .fullscreen.visible:hover .fs-nav,
  .fs-nav:focus { opacity: 1; }
  .fs-nav:hover { background: rgba(255,255,255,0.25); }
  .fs-nav.prev { left: 12px; }
  .fs-nav.next { right: 12px; }

  /* Grid keyboard focus */
  .cam.kbd-focus {
    outline: 2px solid #E10600;
    outline-offset: -2px;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>RACING POINT</h1>
  <span id="status">Loading...</span>
  <select id="rate">
    <option value="1000">1 fps</option>
    <option value="2000" selected>0.5 fps</option>
    <option value="5000">0.2 fps</option>
  </select>
</div>

<div id="grid"></div>

<div class="fullscreen" id="fs"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var cameras = [];
var tileElements = {};  // keyed by nvr_channel
var imgElements = {};   // keyed by nvr_channel
var dotElements = {};   // keyed by nvr_channel
var timer = null;

// Drag and zone state
var dragSrcChannel = null;
var collapsedZones = {};  // { 'entrance': false, 'pods': true, ... }
var focusedTileIndex = -1;  // -1 = no focus

var ZONE_ORDER = ['entrance', 'reception', 'pods', 'other'];

var gridEl   = document.getElementById('grid');
var statusEl = document.getElementById('status');
var rateEl   = document.getElementById('rate');
var fsEl     = document.getElementById('fs');

// ── WebRTC singleton state ────────────────────────────────────────────────────
var GO2RTC_WS = 'ws://192.168.31.27:1984/api/ws';
var activePc = null;        // RTCPeerConnection
var activeWs = null;        // WebSocket to go2rtc
var activeCamera = null;    // current fullscreen camera object
var preWarmTimer = null;    // hover pre-warm timeout
var preWarmPc = null;       // pre-warmed connection
var preWarmWs = null;       // pre-warmed WebSocket
var preWarmChannel = null;  // which channel is pre-warmed
var controlsHideTimer = null;

// ── Build fullscreen DOM (createElement — no innerHTML) ────────────────────────
(function buildFullscreenDOM() {
  // Controls bar
  var controls = document.createElement('div');
  controls.className = 'fs-controls';
  controls.id = 'fs-controls';

  var nameSpan = document.createElement('span');
  nameSpan.className = 'fs-cam-name';
  nameSpan.id = 'fs-name';

  var statusDot = document.createElement('span');
  statusDot.className = 'fs-status-dot connecting';
  statusDot.id = 'fs-dot';

  var closeBtn = document.createElement('button');
  closeBtn.className = 'fs-close-btn';
  closeBtn.id = 'fs-close';
  closeBtn.textContent = '\u00D7';

  controls.appendChild(nameSpan);
  controls.appendChild(statusDot);
  controls.appendChild(closeBtn);

  // Loading spinner
  var loading = document.createElement('div');
  loading.className = 'fs-loading';
  loading.id = 'fs-loading';

  var spinner = document.createElement('div');
  spinner.className = 'fs-spinner';
  loading.appendChild(spinner);

  // Fullscreen iframe — loads go2rtc stream.html for reliable single-stream playback
  var iframe = document.createElement('iframe');
  iframe.className = 'fs-video';
  iframe.id = 'fs-iframe';
  iframe.setAttribute('allow', 'autoplay');
  iframe.style.border = 'none';

  fsEl.appendChild(controls);
  fsEl.appendChild(loading);
  fsEl.appendChild(iframe);

  // Prev/Next nav buttons
  var prevBtn = document.createElement('button');
  prevBtn.className = 'fs-nav prev';
  prevBtn.id = 'fs-prev';
  prevBtn.textContent = '\u2039';  // single left-pointing angle quotation mark
  prevBtn.title = 'Previous camera (Left arrow)';
  prevBtn.addEventListener('click', function() { navigateFullscreen(-1); });

  var nextBtn = document.createElement('button');
  nextBtn.className = 'fs-nav next';
  nextBtn.id = 'fs-next';
  nextBtn.textContent = '\u203A';  // single right-pointing angle quotation mark
  nextBtn.title = 'Next camera (Right arrow)';
  nextBtn.addEventListener('click', function() { navigateFullscreen(1); });

  fsEl.appendChild(prevBtn);
  fsEl.appendChild(nextBtn);
}());

// ── teardownRtc — MUST be defined before any connection-opening code ──────────
function teardownRtc() {
  if (activePc) {
    activePc.ontrack = null;
    activePc.onicecandidate = null;
    activePc.onconnectionstatechange = null;
    activePc.close();
    activePc = null;
  }
  if (activeWs) {
    activeWs.onmessage = null;
    activeWs.onclose = null;
    activeWs.close();
    activeWs = null;
  }
  activeCamera = null;
}

// ── teardownPreWarm ───────────────────────────────────────────────────────────
function teardownPreWarm() {
  clearTimeout(preWarmTimer);
  preWarmTimer = null;
  if (preWarmPc) { preWarmPc.close(); preWarmPc = null; }
  if (preWarmWs) { preWarmWs.close(); preWarmWs = null; }
  preWarmChannel = null;
  // Remove pre-warming visual from all tiles
  document.querySelectorAll('.pre-warming').forEach(function(el) {
    el.classList.remove('pre-warming');
  });
}

// ── connectWebRTC — core go2rtc signaling function ────────────────────────────
function connectWebRTC(streamName, onTrack, onStatus) {
  var ws = new WebSocket(GO2RTC_WS + '?src=' + streamName);
  var pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  pc.addTransceiver('video', { direction: 'recvonly' });
  pc.addTransceiver('audio', { direction: 'recvonly' });

  pc.ontrack = function(e) {
    if (onTrack) onTrack(e.streams[0]);
  };

  pc.onicecandidate = function(e) {
    if (e.candidate && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'webrtc/candidate',
        value: e.candidate.toJSON()
      }));
    }
  };

  pc.onconnectionstatechange = function() {
    if (onStatus) onStatus(pc.connectionState);
  };

  ws.onopen = function() {
    pc.createOffer().then(function(offer) {
      return pc.setLocalDescription(offer);
    }).then(function() {
      ws.send(JSON.stringify({
        type: 'webrtc/offer',
        value: pc.localDescription.sdp
      }));
    }).catch(function(err) {
      console.error('WebRTC offer failed:', err);
      if (onStatus) onStatus('failed');
    });
  };

  ws.onmessage = function(ev) {
    var msg = JSON.parse(ev.data);
    if (msg.type === 'webrtc/answer') {
      pc.setRemoteDescription(new RTCSessionDescription({
        type: 'answer',
        sdp: msg.value
      })).catch(function(err) {
        console.error('setRemoteDescription failed:', err);
      });
    } else if (msg.type === 'webrtc/candidate') {
      pc.addIceCandidate(new RTCIceCandidate(msg.value)).catch(function(err) {
        console.debug('addIceCandidate failed:', err);
      });
    }
  };

  ws.onerror = function() {
    if (onStatus) onStatus('failed');
  };

  return { pc: pc, ws: ws };
}

// ── updateFsStatus ────────────────────────────────────────────────────────────
function updateFsStatus(state, dotEl, loadingEl) {
  if (state === 'connected') {
    dotEl.className = 'fs-status-dot connected';
    loadingEl.style.display = 'none';
  } else if (state === 'failed' || state === 'disconnected' || state === 'closed') {
    dotEl.className = 'fs-status-dot failed';
    loadingEl.style.display = 'none';
    showFallbackMessage();
  }
}

// ── showFallbackMessage — never show blank on WebRTC failure ──────────────────
function showFallbackMessage() {
  // Remove any existing fallback messages first
  fsEl.querySelectorAll('.fs-fallback-msg').forEach(function(m) { m.remove(); });

  var msg = document.createElement('div');
  msg.className = 'fs-fallback-msg';
  msg.textContent = 'Live unavailable \u2014 showing snapshot';
  fsEl.appendChild(msg);

  setTimeout(function() {
    if (msg.parentNode) msg.parentNode.removeChild(msg);
  }, 5000);
}

// ── startControlsAutoHide ─────────────────────────────────────────────────────
function startControlsAutoHide() {
  var controls = document.getElementById('fs-controls');
  controls.classList.remove('auto-hidden');
  clearTimeout(controlsHideTimer);
  controlsHideTimer = setTimeout(function() {
    controls.classList.add('auto-hidden');
  }, 3000);
}

// ── openFullscreen — uses go2rtc stream.html iframe for reliable playback ────
function openFullscreen(camera) {
  var ch = camera.nvr_channel;
  if (!ch) return;

  // Show fullscreen overlay
  fsEl.classList.add('visible');
  document.getElementById('fs-name').textContent = camera.display_name;

  var dotEl = document.getElementById('fs-dot');
  dotEl.className = 'fs-status-dot connecting';

  var loadingEl = document.getElementById('fs-loading');
  loadingEl.style.display = 'block';

  // Load go2rtc's stream.html in iframe — handles MSE/WebRTC/MJPEG fallback
  var iframe = document.getElementById('fs-iframe');
  iframe.src = 'http://192.168.31.27:1984/stream.html?src=ch' + ch + '&mode=mse,webrtc,mjpeg&background=true';

  // Monitor iframe load — hide spinner when loaded
  iframe.onload = function() {
    loadingEl.style.display = 'none';
    dotEl.className = 'fs-status-dot connected';
  };

  activeCamera = camera;

  // Auto-hide controls after 3 seconds
  startControlsAutoHide();
}

// ── closeFullscreen ───────────────────────────────────────────────────────────
function closeFullscreen() {
  fsEl.classList.remove('visible');

  // Clear iframe src to stop the stream
  var iframe = document.getElementById('fs-iframe');
  iframe.src = 'about:blank';

  document.getElementById('fs-loading').style.display = 'none';
  clearTimeout(controlsHideTimer);
  activeCamera = null;

  // Remove any fallback messages
  fsEl.querySelectorAll('.fs-fallback-msg').forEach(function(m) { m.remove(); });
}

// ── navigateFullscreen — cycle prev/next online camera in fullscreen ──────────
function navigateFullscreen(direction) {
  if (!activeCamera || cameras.length === 0) return;
  var navigable = cameras.filter(function(c) {
    return c.nvr_channel != null && c.status !== 'offline' && c.status !== 'disconnected';
  });
  if (navigable.length === 0) return;
  var curIdx = navigable.findIndex(function(c) { return c.nvr_channel === activeCamera.nvr_channel; });
  if (curIdx === -1) curIdx = 0;
  var nextIdx = (curIdx + direction + navigable.length) % navigable.length;
  openFullscreen(navigable[nextIdx]);
}

// ── handleGridKeydown — arrow key grid navigation and Enter to open fullscreen ─
function handleGridKeydown(e) {
  var tiles = Array.from(gridEl.querySelectorAll('.cam'));
  if (tiles.length === 0) return;

  if (e.key === 'Enter' && focusedTileIndex >= 0 && focusedTileIndex < tiles.length) {
    e.preventDefault();
    var ch = parseInt(tiles[focusedTileIndex].dataset.channel);
    var cam = cameras.find(function(c) { return c.nvr_channel === ch; });
    if (cam && cam.nvr_channel != null && cam.status !== 'offline' && cam.status !== 'disconnected') {
      openFullscreen(cam);
    }
    return;
  }

  var cols = getGridColumns();
  var newIdx = focusedTileIndex;

  if (e.key === 'ArrowRight') { newIdx = focusedTileIndex + 1; }
  else if (e.key === 'ArrowLeft') { newIdx = focusedTileIndex - 1; }
  else if (e.key === 'ArrowDown') { newIdx = focusedTileIndex + cols; }
  else if (e.key === 'ArrowUp') { newIdx = focusedTileIndex - cols; }
  else { return; }

  e.preventDefault();
  if (focusedTileIndex < 0) { newIdx = 0; }
  if (newIdx < 0) newIdx = 0;
  if (newIdx >= tiles.length) newIdx = tiles.length - 1;

  if (focusedTileIndex >= 0 && focusedTileIndex < tiles.length) {
    tiles[focusedTileIndex].classList.remove('kbd-focus');
  }
  focusedTileIndex = newIdx;
  tiles[focusedTileIndex].classList.add('kbd-focus');
  tiles[focusedTileIndex].scrollIntoView({ block: 'nearest' });
}

function getGridColumns() {
  var w = window.innerWidth;
  if (w <= 500) return 1;
  if (w <= 800) return 2;
  if (w <= 1200) return 3;
  return 4;
}

// ── Fullscreen event listeners ────────────────────────────────────────────────
document.getElementById('fs-close').addEventListener('click', closeFullscreen);

document.addEventListener('keydown', function(e) {
  if (fsEl.classList.contains('visible')) {
    if (e.key === 'Escape') { closeFullscreen(); return; }
    if (e.key === 'ArrowLeft')  { navigateFullscreen(-1); return; }
    if (e.key === 'ArrowRight') { navigateFullscreen(1);  return; }
    return;
  }
  handleGridKeydown(e);
});

// Backdrop click (click on fs div itself, not on controls/video)
fsEl.addEventListener('click', function(e) {
  if (e.target === fsEl) closeFullscreen();
});

// Mouse move in fullscreen resets controls auto-hide timer
fsEl.addEventListener('mousemove', function() {
  if (fsEl.classList.contains('visible')) {
    startControlsAutoHide();
  }
});

// Clean up fullscreen on page leave
window.addEventListener('beforeunload', closeFullscreen);

// ── Camera list fetch ─────────────────────────────────────────────────────────
function fetchCameras() {
  return fetch('/api/v1/cameras')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Sort by display_order ascending
      cameras = data.slice().sort(function(a, b) {
        return (a.display_order || 0) - (b.display_order || 0);
      });
      buildGrid();
    })
    .catch(function() {
      statusEl.textContent = 'API error';
    });
}

// ── Layout fetch ──────────────────────────────────────────────────────────────
function fetchLayout() {
  return fetch('/api/v1/cameras/layout')
    .then(function(r) { return r.json(); })
    .then(function(layout) {
      if (layout.camera_order && layout.camera_order.length > 0) {
        // Reorder cameras to match saved order; unordered cameras go at end
        var orderMap = {};
        layout.camera_order.forEach(function(ch, i) { orderMap[ch] = i; });
        cameras.sort(function(a, b) {
          var aIdx = (a.nvr_channel in orderMap) ? orderMap[a.nvr_channel] : 9999;
          var bIdx = (b.nvr_channel in orderMap) ? orderMap[b.nvr_channel] : 9999;
          return aIdx - bIdx;
        });
        buildGrid();
      }
    })
    .catch(function() {
      // Layout fetch failed — proceed with defaults
    });
}

// ── Build camera grid tiles ───────────────────────────────────────────────────
function buildGrid() {
  // Clear existing tiles and references
  while (gridEl.firstChild) gridEl.removeChild(gridEl.firstChild);
  tileElements = {};
  imgElements  = {};
  dotElements  = {};

  // Group cameras by zone
  var groups = {};
  ZONE_ORDER.forEach(function(z) { groups[z] = []; });

  cameras.forEach(function(camera) {
    var zone = camera.zone || 'other';
    if (!groups[zone]) groups[zone] = [];
    groups[zone].push(camera);
  });

  // Render all cameras in flat order (zone shown via colored left border)
  var ZONE_COLORS = { entrance: '#E10600', reception: '#2196f3', pods: '#4caf50', other: '#666' };

  // Flatten zones into ordered camera list
  var orderedCameras = [];
  ZONE_ORDER.forEach(function(zone) {
    var zc = groups[zone];
    if (zc && zc.length > 0) zc.forEach(function(c) { orderedCameras.push(c); });
  });

  orderedCameras.forEach(function(camera) {
      var ch = camera.nvr_channel;

      // Tile container
      var tile = document.createElement('div');
      tile.className = 'cam';
      tile.setAttribute('draggable', 'true');
      if (ch != null) tile.setAttribute('data-channel', ch);
      if (camera.status === 'offline' || camera.status === 'disconnected') {
        tile.classList.add('offline');
      }
      // Zone indicator: colored left border
      var zoneColor = ZONE_COLORS[camera.zone || 'other'] || '#666';
      tile.style.borderLeft = '3px solid ' + zoneColor;

      // Label bar
      var label = document.createElement('div');
      label.className = 'cam-label';

      var nameSpan = document.createElement('span');
      nameSpan.textContent = camera.display_name;

      var dot = document.createElement('span');
      dot.className = 'dot ' + statusToDotClass(camera.status);

      label.appendChild(nameSpan);
      label.appendChild(dot);

      // Camera tile media — live video via go2rtc MSE/WebRTC
      var vid;
      var isLive = ch != null && camera.status !== 'offline' && camera.status !== 'disconnected';

      if (isLive) {
        vid = document.createElement('video-stream');
        vid.style.width = '100%';
        vid.style.display = 'block';
        vid.style.aspectRatio = '16/9';
        vid.style.objectFit = 'cover';
        vid.style.background = '#000';
        vid.mode = 'mse,webrtc,mjpeg';
        vid.media = 'video';
        vid.background = true;
        vid.src = 'http://192.168.31.27:1984/api/ws?src=ch' + ch;
      } else {
        vid = document.createElement('img');
        vid.alt = camera.display_name;
        vid.style.width = '100%';
        vid.style.display = 'block';
        vid.style.aspectRatio = '16/9';
        vid.style.objectFit = 'cover';
        vid.style.background = '#000';
      }

      // Transparent click overlay — captures clicks above video-stream
      // (go2rtc's custom element may consume click events internally)
      if (isLive && ch != null) {
        var clickOverlay = document.createElement('div');
        clickOverlay.className = 'click-overlay';
        clickOverlay.addEventListener('click', (function(cam) {
          return function() { openFullscreen(cam); };
        })(camera));
        tile.appendChild(clickOverlay);
      }

      // Offline overlay text
      if (camera.status === 'offline' || camera.status === 'disconnected') {
        var offlineText = document.createElement('span');
        offlineText.className = 'offline-text';
        offlineText.textContent = 'OFFLINE';
        tile.appendChild(offlineText);
      }

      // Pre-warm on hover (500ms)
      tile.addEventListener('mouseenter', (function(cam, t) {
        return function() {
          if (!cam.nvr_channel) return;
          var ch = cam.nvr_channel;
          preWarmTimer = setTimeout(function() {
            if (preWarmChannel === ch) return; // already pre-warming this one
            teardownPreWarm();
            preWarmChannel = ch;
            t.classList.add('pre-warming');
            var conn = connectWebRTC('ch' + ch, null, null);
            preWarmPc = conn.pc;
            preWarmWs = conn.ws;
          }, 500);
        };
      })(camera, tile));

      tile.addEventListener('mouseleave', (function(t) {
        return function() {
          clearTimeout(preWarmTimer);
          preWarmTimer = null;
          t.classList.remove('pre-warming');
          // Keep pre-warm connection alive — don't tear it down on leave
        };
      })(tile));

      // Drag and drop event handlers
      tile.addEventListener('dragstart', function(e) {
        dragSrcChannel = parseInt(this.dataset.channel);
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(dragSrcChannel));
      });

      tile.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
      });

      tile.addEventListener('dragleave', function(e) {
        this.classList.remove('drag-over');
      });

      tile.addEventListener('dragend', function(e) {
        this.classList.remove('dragging');
        // Clean up any lingering drag-over highlights
        document.querySelectorAll('.drag-over').forEach(function(el) {
          el.classList.remove('drag-over');
        });
      });

      tile.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        var targetChannel = parseInt(this.dataset.channel);
        if (dragSrcChannel === null || dragSrcChannel === targetChannel) return;

        // Find source and target indices in cameras array
        var srcIdx = cameras.findIndex(function(c) { return c.nvr_channel === dragSrcChannel; });
        var tgtIdx = cameras.findIndex(function(c) { return c.nvr_channel === targetChannel; });
        if (srcIdx === -1 || tgtIdx === -1) return;

        // Reorder: remove source, insert at target position
        var moved = cameras.splice(srcIdx, 1)[0];
        cameras.splice(tgtIdx, 0, moved);

        // Rebuild grid to reflect new order (preserves zone grouping)
        buildGrid();
        // Auto-save on drop (user decision: no save button needed)
        saveLayout();
        dragSrcChannel = null;
      });

      tile.appendChild(label);
      tile.appendChild(vid);
      gridEl.appendChild(tile);

      if (ch != null) {
        tileElements[ch] = tile;
        imgElements[ch]  = vid;
        dotElements[ch]  = dot;
      }
    });

  focusedTileIndex = -1;
}

// Layout mode removed — auto-fill grid handles all viewport sizes

// ── Status + snapshot refresh for overflow tiles ─────────────────────────────
function refreshStatus() {
  fetch('/api/v1/cameras')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var online = 0;
      var t = Date.now();
      data.forEach(function(cam) {
        var ch = cam.nvr_channel;
        if (ch == null) return;
        if (dotElements[ch]) {
          dotElements[ch].className = 'dot ' + statusToDotClass(cam.status);
        }
        if (cam.status === 'connected' || cam.status === 'reconnecting') online++;
        // Refresh snapshots for overflow tiles (beyond stream budget)
        var el = imgElements[ch];
        if (el && el.tagName === 'IMG' && ch) {
          el.src = '/api/v1/cameras/nvr/' + ch + '/snapshot?t=' + t;
        }
      });
      statusEl.textContent = online + '/' + cameras.length + ' online';
    })
    .catch(function() {});
}

function startLoop() {
  clearInterval(timer);
  refreshStatus();
  timer = setInterval(refreshStatus, 3000); // status + overflow snapshots every 3s
}

rateEl.addEventListener('change', startLoop);

// ── Layout persistence ────────────────────────────────────────────────────────
function saveLayout() {
  fetch('/api/v1/cameras/layout', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      grid_mode: 'auto',
      camera_order: cameras.map(function(c) { return c.nvr_channel; }).filter(Boolean),
      zone_filter: null
    })
  }).catch(function(err) { console.warn('Layout save failed:', err); });
}

// ── Status dot mapping ────────────────────────────────────────────────────────
function statusToDotClass(status) {
  if (status === 'connected')    return 'dot-live';
  if (status === 'reconnecting') return 'dot-stale';
  return 'dot-offline';
}

// ── Initialization ────────────────────────────────────────────────────────────
fetchCameras().then(fetchLayout).then(startLoop);
</script>
</body>
</html>
