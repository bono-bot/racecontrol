<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Racing Point — Cameras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A1A1A; color: #fff; font-family: Montserrat, sans-serif; padding: 20px; }
  h1 { color: #E10600; margin-bottom: 20px; font-size: 1.4rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 16px; }
  .cam { background: #222; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
  .cam-header { padding: 8px 12px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
  .cam-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; }
  .cam img { width: 100%; display: block; background: #000; min-height: 270px; }
</style>
</head>
<body>
<h1>Racing Point — Live Cameras</h1>
<div class="grid">
  <div class="cam">
    <div class="cam-header"><span>Entrance</span><span class="dot"></span></div>
    <img src="/api/v1/cameras/entrance/stream" alt="Entrance">
  </div>
  <div class="cam">
    <div class="cam-header"><span>Reception</span><span class="dot"></span></div>
    <img src="/api/v1/cameras/reception/stream" alt="Reception">
  </div>
  <div class="cam">
    <div class="cam-header"><span>Reception Wide</span><span class="dot"></span></div>
    <img src="/api/v1/cameras/reception_wide/stream" alt="Reception Wide">
  </div>
</div>
</body>
</html>
