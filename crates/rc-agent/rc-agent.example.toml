# ─── rc-agent Configuration (Developer Example) ──────────────────────────────
# Copy this file to rc-agent.toml and fill in pod-specific values.
# DO NOT commit rc-agent.toml — it contains pod-specific configuration.

[pod]
number = 1
name = "Pod 01"
sim = "assetto_corsa"
sim_ip = "127.0.0.1"
sim_port = 9996

[core]
url = "ws://192.168.31.23:8080/ws/agent"
# failover_url = "wss://app.racingpoint.cloud/ws/agent"

# ─── Game Launch Profiles ─────────────────────────────────────────────────────
# Game launch profiles -- each pod has different games installed.
# detect_installed_games() checks steam_app_id against Steam appmanifest files.
# Only games with valid steam_app_id AND verified install appear in kiosk.

[games.assetto_corsa]
steam_app_id = 244210
use_steam = false

[games.f1_25]
steam_app_id = 3059520
use_steam = true

[games.iracing]
steam_app_id = 266410
use_steam = true

[games.assetto_corsa_evo]
steam_app_id = 3058630
use_steam = true

[games.assetto_corsa_rally]
steam_app_id = 3917090
use_steam = true

[games.le_mans_ultimate]
steam_app_id = 1564310
use_steam = true

