# ─── rc-agent Configuration ──────────────────────────────────────────────────
# Copy this file to rc-agent.toml on each gaming PC and adjust paths.

[agent]
pod_name = "Pod 01"
pod_number = 1
server_url = "ws://192.168.1.100:8080/ws/agent"

# ─── Game Paths ──────────────────────────────────────────────────────────────
# Configure installed games. Steam games use steam_app_id for launch.
# Direct exe games use exe_path. Set use_steam = false for direct launch.

[games.assetto_corsa]
steam_app_id = 244210
use_steam = true
# exe_path = "C:\\Program Files (x86)\\Steam\\steamapps\\common\\assettocorsa\\acs.exe"

[games.iracing]
steam_app_id = 266410
use_steam = true
# exe_path = "C:\\Program Files (x86)\\Steam\\steamapps\\common\\iRacing\\iRacingSim64DX11.exe"

[games.f1_25]
steam_app_id = 3059520
use_steam = true

[games.assetto_corsa_evo]
steam_app_id = 3058630
use_steam = true

[games.assetto_corsa_rally]
steam_app_id = 3917090
use_steam = true

[games.le_mans_ultimate]
steam_app_id = 2399420
use_steam = true

[games.forza]
steam_app_id = 2440510
use_steam = true

# ─── AI Debugger ─────────────────────────────────────────────────────────────
# Local Ollama is tried first. Anthropic API is the fallback.

[ai_debugger]
enabled = true
ollama_url = "http://192.168.1.100:11434"
ollama_model = "qwen2.5-coder:14b"
# anthropic_api_key = "sk-ant-..."

# ─── MMA-First Protocol (Unified MMA Protocol v3.0) ──────────────────────────
# Training mode: MMA 5-model diagnosis is Tier 1 for all unresolved issues.
# After training_end, auto-flips to production mode (KB-first, MMA only for novel issues).
# Budget is raised during training to rapidly populate the fleet knowledge base.

[mma]
training_mode = true
training_start = "2026-03-31"
training_end = "2026-04-29"
daily_budget_pod = 15.0      # Production: $10
daily_budget_server = 25.0   # Production: $20
daily_budget_pos = 8.0       # Production: $5
